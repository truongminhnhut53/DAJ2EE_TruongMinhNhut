<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý sản phẩm – MedCare Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family:'Be Vietnam Pro',sans-serif; background:#0f1623; color:#e2e8f0; min-height:100vh; }
        .sidebar { width:248px; background:#161d2c; position:fixed; top:0; left:0; bottom:0; z-index:100; display:flex; flex-direction:column; border-right:1px solid rgba(255,255,255,0.06); }
        .sidebar-brand { padding:24px 20px; border-bottom:1px solid rgba(255,255,255,0.06); }
        .sidebar-brand a { font-size:1.4rem; font-weight:800; color:#fff; text-decoration:none; display:flex; align-items:center; gap:10px; }
        .sidebar-brand a span { color:#00b4d8; }
        .sidebar-nav { padding:16px 12px; flex:1; }
        .sidebar-label { font-size:0.7rem; font-weight:700; color:#4b5563; letter-spacing:1.5px; text-transform:uppercase; padding:8px 10px 4px; }
        .nav-item-custom { display:flex; align-items:center; gap:12px; padding:11px 14px; border-radius:10px; color:rgba(255,255,255,0.65); text-decoration:none; font-size:0.92rem; font-weight:500; transition:all 0.2s; margin-bottom:2px; }
        .nav-item-custom:hover { background:rgba(255,255,255,0.08); color:#fff; }
        .nav-item-custom.active { background:linear-gradient(135deg,#0077b6,#00b4d8); color:#fff; }
        .nav-item-custom i { width:18px; text-align:center; }
        .sidebar-footer { padding:16px 20px; border-top:1px solid rgba(255,255,255,0.06); }
        .main-content { margin-left:248px; padding:28px; min-height:100vh; }
        .top-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:28px; flex-wrap:wrap; gap:16px; }
        .top-bar h1 { font-size:1.6rem; font-weight:800; color:#fff; margin:0; }
        .btn-add-product { background:linear-gradient(135deg,#059669,#06d6a0); color:#fff; border:none; border-radius:12px; padding:11px 22px; font-weight:700; font-size:0.95rem; text-decoration:none; display:flex; align-items:center; gap:8px; transition:all 0.2s; }
        .btn-add-product:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(6,214,160,0.35); color:#fff; }
        .products-card { background:#161d2c; border-radius:18px; border:1px solid rgba(255,255,255,0.07); overflow:hidden; }
        .products-table thead th { background:rgba(0,0,0,0.3); color:#9ca3af; font-weight:600; font-size:0.82rem; padding:14px 18px; border:none; text-transform:uppercase; letter-spacing:0.5px; }
        .products-table tbody td { padding:14px 18px; border-color:rgba(255,255,255,0.05); color:#d1d5db; font-size:0.9rem; vertical-align:middle; }
        .products-table tbody tr:hover td { background:rgba(255,255,255,0.03); }
        .product-img-sm { width:56px; height:56px; object-fit:cover; border-radius:10px; border:1px solid rgba(255,255,255,0.1); }
        .product-name-cell { font-weight:600; color:#fff; }
        .price-cell { color:#f87171; font-weight:700; }
        .stock-pill { background:rgba(0,180,216,0.15); color:#00b4d8; border-radius:100px; padding:3px 12px; font-size:0.8rem; font-weight:700; }
        .stock-low { background:rgba(239,68,68,0.15); color:#f87171; }
        .btn-edit { background:rgba(245,158,11,0.15); color:#f59e0b; border:1px solid rgba(245,158,11,0.25); border-radius:8px; padding:5px 14px; font-size:0.82rem; text-decoration:none; transition:all 0.2s; white-space:nowrap; }
        .btn-edit:hover { background:#f59e0b; color:#fff; border-color:#f59e0b; }
        .btn-del { background:rgba(239,68,68,0.15); color:#f87171; border:1px solid rgba(239,68,68,0.25); border-radius:8px; padding:5px 14px; font-size:0.82rem; text-decoration:none; transition:all 0.2s; white-space:nowrap; }
        .btn-del:hover { background:#ef4444; color:#fff; border-color:#ef4444; }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <div class="sidebar-brand">
        <a th:href="@{/}"><i class="fa-solid fa-heart-pulse"></i> Med<span>Care</span></a>
    </div>
    <nav class="sidebar-nav">
        <div class="sidebar-label">Quản lý</div>
        <a th:href="@{/admin/dashboard}" class="nav-item-custom"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
        <a th:href="@{/admin/products}" class="nav-item-custom active"><i class="fa-solid fa-boxes-stacked"></i> Sản phẩm</a>
        <div class="sidebar-label mt-3">Hệ thống</div>
        <a th:href="@{/}" class="nav-item-custom"><i class="fa-solid fa-house"></i> Trang chủ</a>
        <a th:href="@{/products}" class="nav-item-custom"><i class="fa-solid fa-store"></i> Cửa hàng</a>
    </nav>
    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post" style="margin:0">
            <button type="submit" style="background:none;border:none;padding:0;width:100%;cursor:pointer;display:flex;align-items:center;gap:10px;color:rgba(255,255,255,0.5);font-size:0.88rem;font-family:inherit;transition:color 0.2s">
                <i class="fa-solid fa-right-from-bracket" style="color:#ef4444"></i> Đăng xuất
            </button>
        </form>
    </div>
</div>

<!-- MAIN -->
<div class="main-content">
    <div class="top-bar">
        <h1><i class="fa-solid fa-boxes-stacked" style="color:#00b4d8"></i> Quản lý sản phẩm</h1>
        <a th:href="@{/admin/products/create}" class="btn-add-product">
            <i class="fa-solid fa-plus"></i> Thêm sản phẩm
        </a>
    </div>

    <div class="products-card">
        <div class="table-responsive">
            <table class="table products-table mb-0">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Ảnh</th>
                        <th>Tên sản phẩm</th>
                        <th>Giá</th>
                        <th>Tồn kho</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${products}">
                        <td style="color:#6b7280;font-weight:600">#<span th:text="${p.id}"></span></td>
                        <td><img th:src="@{${p.imageUrl}}" class="product-img-sm" alt="img" onerror="this.onerror=null;this.src='https://placehold.co/400x400/e2e8f0/64748b?text=Product';"></td>
                        <td class="product-name-cell" th:text="${p.name}"></td>
                        <td class="price-cell" th:text="${#numbers.formatDecimal(p.price,0,'COMMA',0,'POINT')} + ' đ'"></td>
                        <td>
                            <span th:classappend="${p.stock < 5} ? 'stock-low'" class="stock-pill" th:text="${p.stock} + ' cái'"></span>
                        </td>
                        <td>
                            <div style="display:flex;gap:8px">
                                <a th:href="@{'/admin/products/edit/' + ${p.id}}" class="btn-edit"><i class="fa-solid fa-pen"></i> Sửa</a>
                                <a th:href="@{'/admin/products/delete/' + ${p.id}}" class="btn-del" onclick="return confirm('Xóa sản phẩm này?')"><i class="fa-solid fa-trash"></i> Xóa</a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${products == null or #lists.isEmpty(products)}">
                        <td colspan="6" class="text-center" style="color:#6b7280;padding:40px">Chưa có sản phẩm nào</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
