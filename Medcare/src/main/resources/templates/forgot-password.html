<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu – MedCare</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #03045e 0%, #0077b6 60%, #00b4d8 100%);
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
        }

        .auth-card {
            background: #fff; border-radius: 24px; padding: 44px 40px;
            width: 100%; max-width: 480px;
            box-shadow: 0 24px 60px rgba(3,4,94,0.25);
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-logo { text-align: center; margin-bottom: 24px; }
        .auth-logo .icon {
            width: 64px; height: 64px; background: linear-gradient(135deg, #f59e0b, #f97316);
            border-radius: 18px; display: inline-flex; align-items: center; justify-content: center;
            font-size: 1.6rem; color: #fff; margin-bottom: 14px;
            box-shadow: 0 8px 20px rgba(245, 158, 11, 0.35);
        }
        .auth-logo h2 { font-size: 1.6rem; font-weight: 800; color: #03045e; }
        .auth-logo p { color: #6c757d; font-size: 0.9rem; margin-top: 4px; line-height: 1.5; }

        .form-label { font-weight: 600; color: #2d3748; font-size: 0.88rem; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
        .form-control {
            border-radius: 12px; border: 1.5px solid #e2e8f0;
            padding: 12px 16px; font-size: 0.95rem; transition: all 0.2s;
        }
        .form-control:focus { border-color: #00b4d8; box-shadow: 0 0 0 3px rgba(0,180,216,0.15); }

        .btn-reset-pw {
            background: linear-gradient(135deg, #0077b6, #00b4d8);
            color: #fff; border: none; border-radius: 12px;
            padding: 13px; font-weight: 700; font-size: 1rem;
            width: 100%; transition: all 0.25s; margin-top: 10px;
            box-shadow: 0 6px 20px rgba(0,119,182,0.3);
        }
        .btn-reset-pw:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(0,119,182,0.4); }

        .alert-error {
            background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c;
            border-radius: 12px; padding: 12px 16px; font-size: 0.88rem; margin-bottom: 20px;
            display: flex; align-items: center; gap: 8px;
        }

        .step-indicator {
            display: flex; gap: 8px; justify-content: center; margin-bottom: 28px;
        }
        .step-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #e2e8f0; transition: all 0.3s;
        }
        .step-dot.active { background: linear-gradient(135deg, #0077b6, #00b4d8); width: 30px; border-radius: 10px; }

        .info-box {
            background: #f0f9ff; border: 1px solid #bae6fd; border-radius: 12px;
            padding: 14px 16px; margin-bottom: 22px; font-size: 0.85rem; color: #0369a1;
            display: flex; align-items: flex-start; gap: 10px; line-height: 1.5;
        }
        .info-box i { margin-top: 3px; font-size: 1rem; }

        .link-back { text-align: center; margin-top: 22px; font-size: 0.88rem; color: #6c757d; }
        .link-back a { color: #0077b6; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
        .link-back a:hover { text-decoration: underline; }

        /* Step transitions */
        .step-section { display: none; }
        .step-section.active { display: block; animation: fadeIn 0.35s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .password-strength { height: 4px; border-radius: 4px; background: #e2e8f0; margin-top: 8px; overflow: hidden; }
        .password-strength-bar { height: 100%; border-radius: 4px; transition: all 0.3s; width: 0; }
        .strength-weak { background: #ef4444; width: 33% !important; }
        .strength-medium { background: #f59e0b; width: 66% !important; }
        .strength-strong { background: #10b981; width: 100% !important; }
        .strength-label { font-size: 0.75rem; margin-top: 4px; font-weight: 600; }
    </style>
</head>
<body>
<div class="auth-card">
    <div class="auth-logo">
        <div class="icon"><i class="fa-solid fa-key"></i></div>
        <h2>Quên mật khẩu?</h2>
        <p>Xác minh danh tính bằng tên đăng nhập và số điện thoại<br>để đặt lại mật khẩu mới</p>
    </div>

    <!-- Step indicator -->
    <div class="step-indicator">
        <div class="step-dot active" id="dot1"></div>
        <div class="step-dot" id="dot2"></div>
    </div>

    <!-- Error alert -->
    <div class="alert-error" th:if="${error}">
        <i class="fa-solid fa-circle-exclamation"></i> <span th:text="${error}"></span>
    </div>

    <!-- Info box -->
    <div class="info-box" id="infoBox">
        <i class="fa-solid fa-circle-info"></i>
        <span>Vui lòng nhập <strong>tên đăng nhập</strong> và <strong>số điện thoại</strong> đã đăng ký để xác thực danh tính của bạn.</span>
    </div>

    <form th:action="@{/forgot-password}" method="post" id="forgotForm">
        <!-- STEP 1: Identity verification -->
        <div class="step-section active" id="step1">
            <div class="mb-3">
                <label class="form-label"><i class="fa-solid fa-user"></i> Tên đăng nhập</label>
                <input type="text" name="username" id="username" class="form-control"
                       placeholder="Nhập tên đăng nhập..." required
                       th:value="${enteredUsername}">
            </div>
            <div class="mb-3">
                <label class="form-label"><i class="fa-solid fa-phone"></i> Số điện thoại</label>
                <input type="tel" name="phone" id="phone" class="form-control"
                       placeholder="Nhập số điện thoại đã đăng ký..." required
                       th:value="${enteredPhone}">
            </div>
            <button type="button" class="btn-reset-pw" onclick="goToStep2()" id="btnNext">
                <i class="fa-solid fa-arrow-right"></i> Tiếp tục
            </button>
        </div>

        <!-- STEP 2: New password -->
        <div class="step-section" id="step2">
            <div class="mb-3">
                <label class="form-label"><i class="fa-solid fa-lock"></i> Mật khẩu mới</label>
                <input type="password" name="newPassword" id="newPassword" class="form-control"
                       placeholder="Nhập mật khẩu mới (tối thiểu 6 ký tự)..." oninput="checkPasswordStrength()">
                <div class="password-strength">
                    <div class="password-strength-bar" id="strengthBar"></div>
                </div>
                <div class="strength-label" id="strengthLabel"></div>
            </div>
            <div class="mb-3">
                <label class="form-label"><i class="fa-solid fa-lock"></i> Nhập lại mật khẩu mới</label>
                <input type="password" name="confirmNewPassword" id="confirmNewPassword" class="form-control"
                       placeholder="Xác nhận mật khẩu mới..." oninput="checkMatch()">
                <div id="matchMessage" style="font-size:0.8rem;margin-top:6px;font-weight:600"></div>
            </div>
            <button type="submit" class="btn-reset-pw" id="btnSubmit" disabled>
                <i class="fa-solid fa-check-circle"></i> Đặt lại mật khẩu
            </button>
            <button type="button" class="btn-reset-pw" onclick="goToStep1()" style="background:#e2e8f0;color:#64748b;box-shadow:none;margin-top:8px">
                <i class="fa-solid fa-arrow-left"></i> Quay lại
            </button>
        </div>
    </form>

    <div class="link-back">
        <a th:href="@{/login}"><i class="fa-solid fa-arrow-left"></i> Quay lại trang đăng nhập</a>
    </div>
</div>

<script>
    function goToStep2() {
        const username = document.getElementById('username').value.trim();
        const phone = document.getElementById('phone').value.trim();
        if (!username || !phone) {
            alert('Vui lòng nhập đầy đủ tên đăng nhập và số điện thoại!');
            return;
        }
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
        document.getElementById('dot1').classList.remove('active');
        document.getElementById('dot2').classList.add('active');
        document.getElementById('infoBox').innerHTML =
            '<i class="fa-solid fa-shield-halved"></i><span>Tạo mật khẩu mới cho tài khoản <strong>' + username + '</strong>. Mật khẩu cần có ít nhất 6 ký tự.</span>';
        document.getElementById('newPassword').focus();
    }

    function goToStep1() {
        document.getElementById('step2').classList.remove('active');
        document.getElementById('step1').classList.add('active');
        document.getElementById('dot2').classList.remove('active');
        document.getElementById('dot1').classList.add('active');
        document.getElementById('infoBox').innerHTML =
            '<i class="fa-solid fa-circle-info"></i><span>Vui lòng nhập <strong>tên đăng nhập</strong> và <strong>số điện thoại</strong> đã đăng ký để xác thực danh tính của bạn.</span>';
    }

    function checkPasswordStrength() {
        const pw = document.getElementById('newPassword').value;
        const bar = document.getElementById('strengthBar');
        const label = document.getElementById('strengthLabel');
        bar.className = 'password-strength-bar';
        if (pw.length === 0) { label.textContent = ''; return; }
        if (pw.length < 6) {
            bar.classList.add('strength-weak');
            label.textContent = '⚠️ Yếu — quá ngắn';
            label.style.color = '#ef4444';
        } else if (pw.length < 10 || !/[A-Z]/.test(pw) || !/[0-9]/.test(pw)) {
            bar.classList.add('strength-medium');
            label.textContent = '🔒 Trung bình';
            label.style.color = '#f59e0b';
        } else {
            bar.classList.add('strength-strong');
            label.textContent = '✅ Mạnh';
            label.style.color = '#10b981';
        }
        checkMatch();
    }

    function checkMatch() {
        const pw = document.getElementById('newPassword').value;
        const confirmPw = document.getElementById('confirmNewPassword').value;
        const matchMsg = document.getElementById('matchMessage');
        const btn = document.getElementById('btnSubmit');

        if (confirmPw.length === 0) { matchMsg.textContent = ''; btn.disabled = true; return; }
        if (pw === confirmPw && pw.length >= 6) {
            matchMsg.textContent = '✅ Mật khẩu khớp';
            matchMsg.style.color = '#10b981';
            btn.disabled = false;
            btn.style.opacity = '1';
        } else if (pw !== confirmPw) {
            matchMsg.textContent = '❌ Mật khẩu không khớp';
            matchMsg.style.color = '#ef4444';
            btn.disabled = true;
            btn.style.opacity = '0.5';
        } else {
            matchMsg.textContent = '⚠️ Mật khẩu phải ít nhất 6 ký tự';
            matchMsg.style.color = '#f59e0b';
            btn.disabled = true;
            btn.style.opacity = '0.5';
        }
    }
</script>
</body>
</html>
